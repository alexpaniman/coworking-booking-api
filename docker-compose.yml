services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: coworking
      POSTGRES_PASSWORD: coworking
      POSTGRES_DB: coworking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworking -d coworking"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://coworking:coworking@db:5432/coworking
      TEST_DATABASE_URL: postgresql+psycopg2://coworking:coworking@db:5432/coworking_test
      SECRET_KEY: change-me-for-demo
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      TELEGRAM_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:

